# CI Pipeline
#
# Purpose
# ───────
# Ensures that the schemas of the API, TypeScript client, and Python client never
# drift out of sync with each other. Three jobs run on every push and pull request:
#
#   1. api          — Type-checks the Workers API and runs unit tests.
#
#   2. ts-client    — Type-checks and tests the TypeScript client. Both unit tests
#                     (fetch stubbed with raw JSON) and integration tests (fetch
#                     routed through the real Hono app via vi.stubGlobal) run in a
#                     single Vitest pass. Depends on `api`.
#
#   3. py-client    — Tests the Python client. Unit tests use pytest-httpx to mock
#                     HTTP at the transport layer. Integration tests start
#                     api/scripts/ci-server.ts as a Node.js subprocess and send
#                     real HTTP requests to it, exercising the full deserialization
#                     chain end-to-end. Depends on `api`.
#
# 목적
# ────
# API, TypeScript 클라이언트, Python 클라이언트 세 레이어의 스키마가 서로 동기화된
# 상태를 유지하도록 강제한다. 모든 push와 pull request에서 다음 세 가지를 검증한다:
#
#   1. api          — Workers API 타입 검사 및 단위 테스트 실행.
#
#   2. ts-client    — TypeScript 클라이언트 타입 검사 및 테스트. 단위 테스트(원시 JSON
#                     stub)와 통합 테스트(vi.stubGlobal로 실제 Hono 앱 경유)를 단일
#                     Vitest 실행으로 처리. api 완료 후 실행.
#
#   3. py-client    — Python 클라이언트 테스트. 단위 테스트는 pytest-httpx로 전송 레이어
#                     mock 처리. 통합 테스트는 api/scripts/ci-server.ts를 Node.js
#                     subprocess로 기동하고 실제 HTTP 요청을 전송해 역직렬화 체인을
#                     end-to-end로 검증. api에 의존.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── API unit tests ──────────────────────────────────────────────────────────
  api:
    name: API unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check API
        run: npx nx type-check api
      - name: Run API unit tests
        run: npx nx test api
      - name: Check OpenAPI spec freshness
        run: npx nx exec api --command "pnpm exec tsx scripts/gen-openapi.ts && git diff --exit-code api/openapi.json"


  # ─── TypeScript client: unit tests + integration tests ───────────────────────
  ts-client:
    name: TypeScript client tests
    runs-on: ubuntu-latest
    needs: api
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check TS client
        run: npx nx type-check ts-client
      # Runs unit tests (mocked fetch) AND integration tests (routed through
      # the Hono app via vi.stubGlobal) in a single vitest pass.
      - name: Run TS client tests (unit + integration)
        run: npx nx test ts-client

  # ─── Python client: unit tests + integration tests ───────────────────────────
  py-client:
    name: Python client tests
    runs-on: ubuntu-latest
    needs: api
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python client and test dependencies
        run: |
          pip install packages/py-client/
          pip install "pytest>=8.0.0" "pytest-asyncio>=0.23.0" "pytest-httpx>=0.21.0"

      - name: Run Python unit tests
        run: pytest packages/py-client/tests/unit/ -v

      - name: Install Node.js dependencies (for integration test mock server)
        run: pnpm install --frozen-lockfile

      - name: Run Python integration tests (against Node.js mock server)
        run: pytest packages/py-client/tests/integration/ -v

  # ─── Coverage badge update ───────────────────────────────────────────────────
  coverage:
    name: Update coverage badges
    runs-on: ubuntu-latest
    needs: [api, ts-client, py-client]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          pip install packages/py-client/ "pytest-cov>=6.0.0" "pytest-asyncio>=0.23.0" "pytest-httpx>=0.21.0"

      - name: Run API coverage
        id: api-cov
        run: |
          cd api && pnpm exec vitest run --coverage 2>&1 | tee ../api-cov.txt
          COV=$(grep "Lines" ../api-cov.txt | grep -oP '[\d.]+%' | head -1)
          echo "pct=$COV" >> $GITHUB_OUTPUT

      - name: Run TS client coverage
        id: ts-cov
        run: |
          cd packages/ts-client && pnpm exec vitest run --coverage 2>&1 | tee ../../ts-cov.txt
          COV=$(grep "Lines" ../../ts-cov.txt | grep -oP '[\d.]+%' | head -1)
          echo "pct=$COV" >> $GITHUB_OUTPUT

      - name: Run Python coverage
        id: py-cov
        run: |
          cd packages/py-client && pytest --cov=src/ollama_models --cov-report=term-missing 2>&1 | tee ../../py-cov.txt
          COV=$(grep "TOTAL" ../../py-cov.txt | awk '{print $NF}')
          echo "pct=${COV}%" >> $GITHUB_OUTPUT

      - name: Update README badges
        run: |
          API_PCT="${{ steps.api-cov.outputs.pct }}"
          TS_PCT="${{ steps.ts-cov.outputs.pct }}"
          PY_PCT="${{ steps.py-cov.outputs.pct }}"
          # Strip % and round to integer for badge URL
          API_NUM=$(printf "%.0f" "${API_PCT%%\%}")
          TS_NUM=$(printf "%.0f" "${TS_PCT%%\%}")
          PY_NUM=$(printf "%.0f" "${PY_PCT%%\%}")
          sed -i "s|coverage_API-[0-9.]*%25|coverage_API-${API_NUM}%25|g" README.md
          sed -i "s|coverage_TS-[0-9.]*%25|coverage_TS-${TS_NUM}%25|g" README.md
          sed -i "s|coverage_Python-[0-9.]*%25|coverage_Python-${PY_NUM}%25|g" README.md

      - name: Commit updated badges
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: update coverage badges" && git push
