# CI Pipeline
#
# Purpose
# в”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Ensures that the schemas of the API, TypeScript client, and Python client never
# drift out of sync with each other. Three jobs run on every push and pull request:
#
#   1. api          вҖ” Type-checks the Workers API and runs unit tests.
#
#   2. ts-client    вҖ” Type-checks and tests the TypeScript client. Both unit tests
#                     (fetch stubbed with raw JSON) and integration tests (fetch
#                     routed through the real Hono app via vi.stubGlobal) run in a
#                     single Vitest pass. Depends on `api`.
#
#   3. py-client    вҖ” Tests the Python client. Unit tests use pytest-httpx to mock
#                     HTTP at the transport layer. Integration tests start
#                     api/scripts/ci-server.ts as a Node.js subprocess and send
#                     real HTTP requests to it, exercising the full deserialization
#                     chain end-to-end. Depends on `api`.
#
# лӘ©м Ғ
# в”Җв”Җв”Җв”Җ
# API, TypeScript нҒҙлқјмқҙм–ёнҠё, Python нҒҙлқјмқҙм–ёнҠё м„ё л Ҳмқҙм–ҙмқҳ мҠӨнӮӨл§Ҳк°Җ м„ңлЎң лҸҷкё°нҷ”лҗң
# мғҒнғңлҘј мң м§Җн•ҳлҸ„лЎқ к°•м ңн•ңлӢӨ. лӘЁл“  pushмҷҖ pull requestм—җм„ң лӢӨмқҢ м„ё к°Җм§ҖлҘј кІҖмҰқн•ңлӢӨ:
#
#   1. api          вҖ” Workers API нғҖмһ… кІҖмӮ¬ л°Ҹ лӢЁмң„ н…ҢмҠӨнҠё мӢӨн–ү.
#
#   2. ts-client    вҖ” TypeScript нҒҙлқјмқҙм–ёнҠё нғҖмһ… кІҖмӮ¬ л°Ҹ н…ҢмҠӨнҠё. лӢЁмң„ н…ҢмҠӨнҠё(мӣҗмӢң JSON
#                     stub)мҷҖ нҶөн•© н…ҢмҠӨнҠё(vi.stubGlobalлЎң мӢӨм ң Hono м•ұ кІҪмң )лҘј лӢЁмқј
#                     Vitest мӢӨн–үмңјлЎң мІҳлҰ¬. api мҷ„лЈҢ нӣ„ мӢӨн–ү.
#
#   3. py-client    вҖ” Python нҒҙлқјмқҙм–ёнҠё н…ҢмҠӨнҠё. лӢЁмң„ н…ҢмҠӨнҠёлҠ” pytest-httpxлЎң м „мҶЎ л Ҳмқҙм–ҙ
#                     mock мІҳлҰ¬. нҶөн•© н…ҢмҠӨнҠёлҠ” api/scripts/serve-for-ci.tsлҘј Node.js
#                     subprocessлЎң кё°лҸҷн•ҳкі  мӢӨм ң HTTP мҡ”мІӯмқ„ м „мҶЎн•ҙ м—ӯм§Ғл ¬нҷ” мІҙмқёмқ„
#                     end-to-endлЎң кІҖмҰқ. apiм—җ мқҳмЎҙ.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # в”Җв”Җв”Җ API unit tests в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  api:
    name: API unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check API
        run: pnpm --filter ollama-models-api type-check

      - name: Run API unit tests
        run: pnpm --filter ollama-models-api test

  # в”Җв”Җв”Җ TypeScript client: unit tests + integration tests в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  ts-client:
    name: TypeScript client tests
    runs-on: ubuntu-latest
    needs: api
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check TS client
        run: pnpm --filter @devcomfort/ollama-models type-check

      # Runs unit tests (mocked fetch) AND integration tests (routed through
      # the Hono app via vi.stubGlobal) in a single vitest pass.
      - name: Run TS client tests (unit + integration)
        run: pnpm --filter @devcomfort/ollama-models test

  # в”Җв”Җв”Җ Python client: unit tests + integration tests в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  py-client:
    name: Python client tests
    runs-on: ubuntu-latest
    needs: api
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install rye
        run: curl -sSf https://rye.astral.sh/get | RYE_INSTALL_OPTION="--yes" bash
        env:
          RYE_NO_AUTO_INSTALL: '1'

      - name: Add rye to PATH
        run: echo "$HOME/.rye/shims" >> $GITHUB_PATH

      - name: Sync Python dependencies (via rye)
        run: cd packages/py-client && rye sync

      - name: Install Node.js dependencies (for integration test mock server)
        run: pnpm install --frozen-lockfile

      - name: Run Python unit tests
        run: cd packages/py-client && rye run pytest tests/test_client.py tests/test_types.py -v

      - name: Run Python integration tests (against Node.js mock server)
        run: cd packages/py-client && rye run pytest tests/test_integration.py -v
