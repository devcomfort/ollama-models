# Sequential Deploy Pipeline (Staging → Production)
#
# Purpose
# ───────
# Deploys the API to staging first, verifies it, then promotes to production.
# This ensures production never receives untested code.
#
#   1. deploy-staging    — Deploy to Cloudflare Workers staging environment.
#   2. verify-staging    — Health check + smoke tests against staging.
#   3. deploy-production — Promote to production (only if staging passes).
#   4. e2e               — Run the full E2E suite against production.
#   5. deploy-ts-client  — Publish @devcomfort/ollama-models to npm.
#   6. deploy-py-client  — Publish ollama-models to PyPI (via OIDC).
#
# Triggered manually via workflow_dispatch or on pushes to main that touch
# api/, packages/ts-client/, or packages/py-client/.
#
# 목적
# ────
# API를 스테이징에 먼저 배포하고 검증한 뒤 프로덕션으로 승격한다.
# 프로덕션에 테스트되지 않은 코드가 배포되지 않도록 보장한다.
#
#   1. deploy-staging    — Cloudflare Workers 스테이징 환경에 배포.
#   2. verify-staging    — 스테이징 대상 헬스 체크 + 스모크 테스트.
#   3. deploy-production — 스테이징 통과 시 프로덕션으로 승격.
#   4. e2e               — 프로덕션 대상 전체 E2E 스위트 실행.
#   5. deploy-ts-client  — @devcomfort/ollama-models를 npm에 출시.
#   6. deploy-py-client  — ollama-models를 PyPI에 출시(OIDC).

name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - '!api/openapi.json'
      - '!api/README.md'
      - 'packages/ts-client/**'
      - '!packages/ts-client/README.md'
      - 'packages/py-client/**'
      - '!packages/py-client/README.md'
      - 'docs/**'
      - '!docs/README.md'
      - '.github/workflows/deploy.yml'
      - 'scripts/e2e.sh'

env:
  API_URL: https://ollama-models-api.devcomfort.workers.dev
  STAGING_URL: https://ollama-models-api-staging.devcomfort.workers.dev

jobs:
  # ─── 1. Deploy to staging ──────────────────────────────────────────────────
  deploy-staging:
    name: Deploy API to staging
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Deploy to staging
        run: npx nx run api:deploy:staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Notify staging deploy failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          chmod +x scripts/notify.sh
          ./scripts/notify.sh slack critical "Staging deploy failed" "Job: ${{ github.job }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
  # ─── 2. Verify staging ────────────────────────────────────────────────────
  verify-staging:
    name: Verify staging health
    runs-on: ubuntu-latest
    needs: deploy-staging

    steps:
      - name: Wait for propagation
        run: sleep 15
      - name: Check /health endpoint
        run: |
          echo "Checking $STAGING_URL/health ..."
          HTTP_CODE=$(curl -s -o /tmp/health.json -w "%{http_code}" "$STAGING_URL/health")
          echo "HTTP $HTTP_CODE"
          cat /tmp/health.json
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Health check returned HTTP $HTTP_CODE"
            exit 1
          fi
          OK=$(jq -r '.ok' /tmp/health.json)
          if [ "$OK" != "true" ]; then
            echo "❌ Health check body reports ok=false"
            exit 1
          fi
          echo "✅ API is healthy"
      - name: Smoke test /search endpoint
        run: |
          echo "Checking $STAGING_URL/search?q=qwen3&page=1 ..."
          HTTP_CODE=$(curl -s -o /tmp/search.json -w "%{http_code}" "$STAGING_URL/search?q=qwen3&page=1")
          echo "HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Search endpoint returned HTTP $HTTP_CODE"
            exit 1
          fi
          echo "✅ Search endpoint is responding"
      - name: Smoke test /model endpoint
        run: |
          echo "Checking $STAGING_URL/model?name=library/qwen3 ..."
          HTTP_CODE=$(curl -s -o /tmp/model.json -w "%{http_code}" "$STAGING_URL/model?name=library/qwen3")
          echo "HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Model endpoint returned HTTP $HTTP_CODE"
            exit 1
          fi
          echo "✅ Model endpoint is responding"
      - name: Notify verification failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          chmod +x scripts/notify.sh
          ./scripts/notify.sh slack critical "Staging verification failed" "Job: ${{ github.job }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  # ─── 3. Deploy to production ───────────────────────────────────────────────
  deploy-production:
    name: Deploy API to production
    runs-on: ubuntu-latest
    needs: verify-staging
    environment: production
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Deploy to production
        run: npx nx deploy api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Notify production deploy failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          chmod +x scripts/notify.sh
          ./scripts/notify.sh slack critical "Production deploy failed" "Job: ${{ github.job }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
  # ─── 4. E2E test suite against production ──────────────────────────────────
  e2e:
    name: E2E test suite
    runs-on: ubuntu-latest
    needs: deploy-production

    steps:
      - uses: actions/checkout@v4
      - name: Run E2E tests
        run: |
          chmod +x scripts/e2e.sh
          ./scripts/e2e.sh "$API_URL"
      - name: Notify E2E failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          chmod +x scripts/notify.sh
          ./scripts/notify.sh slack critical "E2E tests failed" "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  # ─── 4. Deploy TypeScript client ────────────────────────────────────────────
  deploy-ts-client:
    name: Publish TS client to npm
    runs-on: ubuntu-latest
    needs: e2e
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: npx nx test ts-client
      - name: Build
        run: npx nx build ts-client

      - name: Post-build smoke test (verify built artifact)
        run: chmod +x scripts/smoke-ts-client.sh && ./scripts/smoke-ts-client.sh

      - name: Publish to npm
        if: startsWith(github.ref, 'refs/tags/ts-v')
        run: cd packages/ts-client && pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Notify deploy success
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          chmod +x scripts/notify.sh
          ./scripts/notify.sh slack info "Deploy complete" "All checks passed\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  # ─── 5. Deploy documentation site ─────────────────────────────────────────
  deploy-docs:
    name: Deploy docs to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: e2e
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: npx nx build docs
        env:
          NODE_OPTIONS: --max_old_space_size=4096

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy docs/dist --project-name ollama-models --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Notify docs deploy failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          chmod +x scripts/notify.sh
          ./scripts/notify.sh slack warning "Docs deploy failed" "Job: ${{ github.job }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  # ─── 6. Deploy Python client ────────────────────────────────────────────────
  # PyPI publish is handled by .github/workflows/publish-pypi.yml on 'py-v*' tag
  # pushes. OIDC Trusted Publisher is configured against that workflow file.
