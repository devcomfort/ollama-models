# Sequential Deploy Pipeline
#
# Purpose
# в”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Deploys the API, verifies it is healthy, then deploys both clients.
# This sequential design ensures that client packages never ship against
# a broken or unreachable API endpoint.
#
#   1. deploy-api       вҖ” Deploy the Cloudflare Workers API via wrangler.
#   2. health-check     вҖ” Hit the live /health endpoint and fail the pipeline
#                         if any probe is not ok.
#   3. e2e              вҖ” Run the full E2E test suite against the deployed API.
#   4. deploy-ts-client вҖ” Publish @devcomfort/ollama-models to npm.
#   5. deploy-py-client вҖ” Publish ollama-models to PyPI (via OIDC).
#
# Triggered manually via workflow_dispatch or on pushes to main that touch
# api/, packages/ts-client/, or packages/py-client/.
#
# лӘ©м Ғ
# в”Җв”Җв”Җв”Җ
# APIлҘј л°°нҸ¬н•ҳкі  м •мғҒ лҸҷмһ‘мқ„ нҷ•мқён•ң л’Ө нҒҙлқјмқҙм–ёнҠёлҘј л°°нҸ¬н•ңлӢӨ.
# мҲңм°Ё м„Өкі„лЎң нҒҙлқјмқҙм–ёнҠё нҢЁнӮӨм§Җк°Җ к№Ём§Җкұ°лӮҳ лҸ„лӢ¬ л¶Ҳк°ҖлҠҘн•ң API м—”л“ңнҸ¬мқёнҠёлҘј
# н–Ҙн•ҙ м¶ңмӢңлҗҳм§Җ м•ҠлҸ„лЎқ ліҙмһҘн•ңлӢӨ.
#
#   1. deploy-api       вҖ” wranglerлЎң Cloudflare Workers API л°°нҸ¬.
#   2. health-check     вҖ” лқјмқҙлёҢ /health м—”л“ңнҸ¬мқёнҠёлҘј нҳём¶ңн•ҳкі  н”„лЎңлёҢк°Җ
#                         okк°Җ м•„лӢҲл©ҙ нҢҢмқҙн”„лқјмқё мӢӨнҢЁ мІҳлҰ¬.
#   3. e2e              вҖ” л°°нҸ¬лҗң API лҢҖмғҒмңјлЎң м „мІҙ E2E н…ҢмҠӨнҠё мҠӨмң„нҠё мӢӨн–ү.
#   4. deploy-ts-client вҖ” @devcomfort/ollama-modelsлҘј npmм—җ м¶ңмӢң.
#   5. deploy-py-client вҖ” ollama-modelsлҘј PyPIм—җ м¶ңмӢң(OIDC).

name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - '!api/openapi.json'
      - '!api/README.md'
      - 'packages/ts-client/**'
      - '!packages/ts-client/README.md'
      - 'packages/py-client/**'
      - '!packages/py-client/README.md'
      - '.github/workflows/deploy.yml'
      - 'scripts/e2e.sh'

env:
  API_URL: https://ollama-models-api.devcomfort.workers.dev

jobs:
  # в”Җв”Җв”Җ 1. Deploy API в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  deploy-api:
    name: Deploy API to Cloudflare Workers
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy to Cloudflare Workers
        run: pnpm --filter ollama-models-api run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  # в”Җв”Җв”Җ 2. Health check against deployed API в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  health-check:
    name: Verify deployed API health
    runs-on: ubuntu-latest
    needs: deploy-api

    steps:
      - name: Wait for propagation
        run: sleep 15

      - name: Check /health endpoint
        run: |
          echo "Checking $API_URL/health ..."
          HTTP_CODE=$(curl -s -o /tmp/health.json -w "%{http_code}" "$API_URL/health")
          echo "HTTP $HTTP_CODE"
          cat /tmp/health.json

          if [ "$HTTP_CODE" != "200" ]; then
            echo "вқҢ Health check returned HTTP $HTTP_CODE"
            exit 1
          fi

          OK=$(jq -r '.ok' /tmp/health.json)
          if [ "$OK" != "true" ]; then
            echo "вқҢ Health check body reports ok=false"
            exit 1
          fi

          echo "вң… API is healthy"

      - name: Smoke test /search endpoint
        run: |
          echo "Checking $API_URL/search?q=qwen3&page=1 ..."
          HTTP_CODE=$(curl -s -o /tmp/search.json -w "%{http_code}" "$API_URL/search?q=qwen3&page=1")
          echo "HTTP $HTTP_CODE"
          cat /tmp/search.json

          if [ "$HTTP_CODE" != "200" ]; then
            echo "вқҢ Search endpoint returned HTTP $HTTP_CODE"
            exit 1
          fi

          echo "вң… Search endpoint is responding"

      - name: Smoke test /model endpoint
        run: |
          echo "Checking $API_URL/model?name=library/qwen3 ..."
          HTTP_CODE=$(curl -s -o /tmp/model.json -w "%{http_code}" "$API_URL/model?name=library/qwen3")
          echo "HTTP $HTTP_CODE"
          cat /tmp/model.json

          if [ "$HTTP_CODE" != "200" ]; then
            echo "вқҢ Model endpoint returned HTTP $HTTP_CODE"
            exit 1
          fi

          echo "вң… Model endpoint is responding"

  # в”Җв”Җв”Җ 3. E2E test suite against deployed API в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  e2e:
    name: E2E test suite
    runs-on: ubuntu-latest
    needs: health-check

    steps:
      - uses: actions/checkout@v4

      - name: Run E2E tests
        run: |
          chmod +x scripts/e2e.sh
          ./scripts/e2e.sh "$API_URL"

  # в”Җв”Җв”Җ 4. Deploy TypeScript client в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  deploy-ts-client:
    name: Publish TS client to npm
    runs-on: ubuntu-latest
    needs: e2e
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm --filter @devcomfort/ollama-models test

      - name: Build
        run: pnpm --filter @devcomfort/ollama-models build

      - name: Publish to npm
        run: pnpm --filter @devcomfort/ollama-models publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # в”Җв”Җв”Җ 4. Deploy Python client в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  deploy-py-client:
    name: Publish Python client to PyPI
    runs-on: ubuntu-latest
    needs: e2e
    environment: pypi
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: |
          pip install \
            httpx \
            "pytest>=8.0.0" \
            "pytest-asyncio>=0.23.0" \
            "pytest-httpx>=0.21.0"
          pip install packages/py-client/

      - name: Run tests
        run: pytest packages/py-client/tests/test_client.py packages/py-client/tests/test_types.py -v

      - name: Build distribution
        run: |
          pip install build
          python -m build packages/py-client/ --outdir packages/py-client/dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/py-client/dist/
