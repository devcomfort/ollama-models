# Sequential Deploy Pipeline (Staging → Production)
#
# Deploys the API to staging first, verifies it, then promotes to production.
# This ensures production never receives untested code.
#
#   1. deploy-staging    — Deploy Tail Worker + API to staging.
#   2. verify-staging    — Health check + smoke tests against staging.
#   3. deploy-production — Deploy Tail Worker + API to production.
#   4. e2e               — Run the full E2E suite against production.
#   5. deploy-ts-client  — Publish ollama-models to npm.
#   6. deploy-docs       — Deploy docs to Cloudflare Pages.

name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - '!api/openapi.json'
      - '!api/README.md'
      - 'packages/ts-client/**'
      - '!packages/ts-client/README.md'
      - 'packages/py-client/**'
      - '!packages/py-client/README.md'
      - 'docs/**'
      - '!docs/README.md'
      - 'workers/**'
      - '.github/workflows/deploy.yml'
      - 'scripts/e2e.sh'

env:
  API_URL: https://ollama-models-api.devcomfort.workers.dev
  STAGING_URL: https://ollama-models-api-staging.devcomfort.workers.dev

jobs:
  # ─── 1. Deploy to staging ──────────────────────────────────────────────────
  deploy-staging:
    name: Deploy API to staging
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Deploy Tail Worker (alerts)
        run: npx wrangler deploy
        working-directory: workers/alerts
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy API to staging
        run: npx nx run api:deploy:staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ─── 2. Verify staging ────────────────────────────────────────────────────
  verify-staging:
    name: Verify staging health
    runs-on: ubuntu-latest
    needs: deploy-staging

    steps:
      - name: Wait for propagation
        run: sleep 15
      - name: Check /health endpoint
        run: |
          echo "Checking $STAGING_URL/health ..."
          HTTP_CODE=$(curl -s -o /tmp/health.json -w "%{http_code}" "$STAGING_URL/health")
          echo "HTTP $HTTP_CODE"
          cat /tmp/health.json
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Health check returned HTTP $HTTP_CODE"
            exit 1
          fi
          OK=$(jq -r '.ok' /tmp/health.json)
          if [ "$OK" != "true" ]; then
            echo "❌ Health check body reports ok=false"
            exit 1
          fi
          echo "✅ API is healthy"
      - name: Smoke test /search endpoint
        run: |
          echo "Checking $STAGING_URL/search?q=qwen3&page=1 ..."
          HTTP_CODE=$(curl -s -o /tmp/search.json -w "%{http_code}" "$STAGING_URL/search?q=qwen3&page=1")
          echo "HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Search endpoint returned HTTP $HTTP_CODE"
            exit 1
          fi
          echo "✅ Search endpoint is responding"
      - name: Smoke test /model endpoint
        run: |
          echo "Checking $STAGING_URL/model?name=library/qwen3 ..."
          HTTP_CODE=$(curl -s -o /tmp/model.json -w "%{http_code}" "$STAGING_URL/model?name=library/qwen3")
          echo "HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Model endpoint returned HTTP $HTTP_CODE"
            exit 1
          fi
          echo "✅ Model endpoint is responding"

  # ─── 3. Deploy to production ───────────────────────────────────────────────
  deploy-production:
    name: Deploy API to production
    runs-on: ubuntu-latest
    needs: verify-staging
    environment: production
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Deploy Tail Worker (alerts)
        run: npx wrangler deploy
        working-directory: workers/alerts
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy API to production
        run: npx nx deploy api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ─── 4. E2E test suite against production ──────────────────────────────────
  e2e:
    name: E2E test suite
    runs-on: ubuntu-latest
    needs: deploy-production

    steps:
      - uses: actions/checkout@v4
      - name: Run E2E tests
        run: |
          chmod +x scripts/e2e.sh
          ./scripts/e2e.sh "$API_URL"

  # ─── 5. Deploy TypeScript client ───────────────────────────────────────────
  deploy-ts-client:
    name: Publish TS client to npm
    runs-on: ubuntu-latest
    needs: e2e
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run tests
        run: npx nx test ts-client
      - name: Build
        run: npx nx build ts-client
      - name: Post-build smoke test (verify built artifact)
        run: chmod +x scripts/smoke-ts-client.sh && ./scripts/smoke-ts-client.sh
      - name: Publish to npm
        if: startsWith(github.ref, 'refs/tags/ts-v')
        run: cd packages/ts-client && pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ─── 6. Deploy documentation site ─────────────────────────────────────────
  deploy-docs:
    name: Deploy docs to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: e2e
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build docs
        run: npx nx build docs
        env:
          NODE_OPTIONS: --max_old_space_size=4096
      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy docs/dist --project-name ollama-models --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  # ─── 7. Deploy Python client ───────────────────────────────────────────────
  # PyPI publish is handled by .github/workflows/publish-pypi.yml on 'py-v*' tag
  # pushes. OIDC Trusted Publisher is configured against that workflow file.
