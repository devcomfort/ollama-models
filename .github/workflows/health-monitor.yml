name: Health Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Force trigger auto-heal regardless of health status'
        type: boolean
        default: false
      target_env:
        description: 'Which API to probe (cron always probes production)'
        type: choice
        options:
          - production
          - staging
        default: production

permissions:
  actions: write
  pull-requests: read
  issues: read

concurrency:
  group: health-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Probe /health (3 attempts, 5s apart, only on structure_change)
        id: probe
        env:
          # Cron runs default to production. Manual dispatch can target staging
          # for auto-heal e2e simulation. The empty-string fallback handles the
          # cron case where github.event.inputs is null.
          TARGET_ENV: ${{ github.event.inputs.target_env || 'production' }}
        run: |
          set -uo pipefail

          if [ "$TARGET_ENV" = "staging" ]; then
            API_URL="https://ollama-models-api-staging.devcomfort.workers.dev"
          else
            API_URL="https://ollama-models-api.devcomfort.workers.dev"
          fi
          echo "Probing: $API_URL"

          # test_mode: skip health probes and force chain execution for debugging
          if [ "${{ github.event.inputs.test_mode }}" = "true" ]; then
            echo "TEST MODE: skipping health probes, forcing trigger=true"
            echo "trigger=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          probe() {
            local body
            body=$(curl -fsS --max-time 15 "$API_URL/health" 2>/dev/null || echo '{"failure_kind":"api_unreachable"}')
            echo "$body" | jq -r '.failure_kind // "null"'
          }

          attempt1=$(probe)
          echo "attempt1=$attempt1"

          if [ "$attempt1" != "structure_change" ]; then
            echo "First probe returned: $attempt1 — not a structure change. Exiting."
            echo "trigger=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "First probe detected structure_change. Re-checking 2 more times (5s apart)..."
          sleep 5
          attempt2=$(probe)
          echo "attempt2=$attempt2"

          if [ "$attempt2" != "structure_change" ]; then
            echo "Second probe returned: $attempt2 — transient. Exiting."
            echo "trigger=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          sleep 5
          attempt3=$(probe)
          echo "attempt3=$attempt3"

          if [ "$attempt3" != "structure_change" ]; then
            echo "Third probe returned: $attempt3 — transient. Exiting."
            echo "trigger=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "All 3 attempts returned structure_change. Triggering auto-heal."
          echo "trigger=true" >> "$GITHUB_OUTPUT"

      - name: Trigger auto-heal
        if: steps.probe.outputs.trigger == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Duplicate prevention: skip trigger if a prior incident is still being handled.
          # Both checks short-circuit so we don't pile up redundant workflow runs or PRs.
          open_prs=$(gh pr list \
            --repo "${{ github.repository }}" \
            --label auto-heal \
            --state open \
            --limit 100 \
            --json number \
            --jq 'length')
          if [ "$open_prs" -gt 0 ]; then
            echo "Skipping trigger: $open_prs open auto-heal PR(s) already awaiting review."
            exit 0
          fi

          open_issues=$(gh issue list \
            --repo "${{ github.repository }}" \
            --label needs-human \
            --state open \
            --limit 100 \
            --json number \
            --jq 'length')
          if [ "$open_issues" -gt 0 ]; then
            echo "Skipping trigger: $open_issues open needs-human issue(s) awaiting manual intervention."
            exit 0
          fi

          gh workflow run "Auto-Heal Scrapers" \
            --repo "${{ github.repository }}" \
            -f detected_at="${{ github.event.repository.updated_at }}" \
            -f run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
