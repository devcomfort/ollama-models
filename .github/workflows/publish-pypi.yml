name: Publish to PyPI

on:
  push:
    tags:
      - 'py-v*'
  workflow_call:
    inputs:
      test-pypi:
        description: 'Publish to TestPyPI instead of production PyPI'
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: |
          pip install \
            httpx \
            pytest>=8.0.0 \
            pytest-asyncio>=0.23.0 \
            "pytest-httpx>=0.21.0"
          pip install packages/py-client/

      - name: Run tests
        run: pytest packages/py-client/tests/ -v

      - name: Build distribution
        run: |
          pip install build
          python -m build packages/py-client/ --outdir packages/py-client/dist/

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: packages/py-client/dist/

  publish-testpypi:
    if: ${{ github.event_name == 'workflow_call' && inputs.test-pypi }}
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    if: ${{ github.event_name != 'workflow_call' || !inputs.test-pypi }}
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
